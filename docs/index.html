<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Techstars Portfolio Explorer</title>
<meta name="description" content="Search and filter every Techstars portfolio company — free open dataset." />
<!-- SheetJS for in-browser Excel export -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
  :root {
    --bg:#0d1117; --panel:#161b22; --border:#30363d; --text:#e6edf3;
    --muted:#8b949e; --accent:#58a6ff; --chip:#21262d; --hover:#1f2937;
    --uni:#d29922; --exit:#3fb950; --bcorp:#2f81f7; --sel:#1c2d3f;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  a{color:var(--accent);text-decoration:none;}
  a:hover{text-decoration:underline;}

  /* ── Layout ── */
  header{padding:28px 20px 0;max-width:1140px;margin:0 auto;}
  h1{font-size:24px;font-weight:700;margin-bottom:4px;}
  .sub{color:var(--muted);margin-bottom:18px;font-size:14px;}
  main{max-width:1140px;margin:0 auto;padding:0 20px 80px;}

  /* ── Stat pills ── */
  .stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;}
  .stat{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px 16px;min-width:100px;}
  .stat b{display:block;font-size:20px;}
  .stat span{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.05em;}

  /* ── Controls ── */
  .controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px;}
  input,select{background:var(--panel);color:var(--text);border:1px solid var(--border);
    border-radius:8px;padding:9px 12px;font-size:14px;outline:none;}
  input:focus,select:focus{border-color:var(--accent);}
  input[type=search]{flex:1 1 240px;min-width:180px;}
  .toggles{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  .toggle{background:var(--chip);border:1px solid var(--border);border-radius:20px;
    padding:6px 13px;cursor:pointer;font-size:13px;user-select:none;transition:all .15s;}
  .toggle:hover{border-color:var(--accent);}
  .toggle.on{background:var(--accent);color:#0d1117;border-color:var(--accent);font-weight:600;}

  /* ── Toolbar (select + export) ── */
  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;
    background:var(--panel);border:1px solid var(--border);border-radius:10px;
    padding:10px 14px;margin-bottom:12px;}
  .toolbar-left{display:flex;gap:8px;align-items:center;flex:1;}
  .cb-all{width:17px;height:17px;cursor:pointer;accent-color:var(--accent);}
  .sel-label{font-size:13px;color:var(--muted);}
  .sel-label b{color:var(--text);}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;
    font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);
    background:var(--chip);color:var(--text);transition:all .15s;}
  .btn:hover:not(:disabled){background:var(--hover);border-color:var(--accent);color:var(--accent);}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn-csv{background:#21343c;border-color:#3fb950;color:#3fb950;}
  .btn-csv:hover:not(:disabled){background:#1a3028;}
  .btn-xl{background:#1e2d4a;border-color:#58a6ff;color:#58a6ff;}
  .btn-xl:hover:not(:disabled){background:#162038;}
  .count-badge{font-size:13px;color:var(--muted);}

  /* ── Company cards ── */
  .list{display:grid;gap:8px;}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;
    padding:12px 14px;display:flex;gap:12px;align-items:flex-start;transition:border-color .15s;cursor:default;}
  .card.selected{background:var(--sel);border-color:var(--accent);}
  .card:hover{border-color:#484f58;}
  .card-cb{margin-top:3px;width:16px;height:16px;flex:none;cursor:pointer;accent-color:var(--accent);}
  .logo{width:42px;height:42px;border-radius:8px;object-fit:contain;background:#fff;flex:none;}
  .logo.ph{background:var(--chip);display:grid;place-items:center;color:var(--muted);font-weight:700;font-size:14px;}
  .body{min-width:0;flex:1;}
  .name{font-weight:600;font-size:15px;margin-bottom:2px;}
  .desc{color:var(--muted);font-size:13px;margin-bottom:7px;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .meta{display:flex;gap:6px;flex-wrap:wrap;font-size:12px;color:var(--muted);align-items:center;}
  .chip{background:var(--chip);border:1px solid var(--border);border-radius:5px;padding:1px 7px;}
  .badge{border-radius:5px;padding:1px 7px;font-weight:600;color:#0d1117;}
  .b-uni{background:var(--uni);}
  .b-exit{background:var(--exit);}
  .b-bcorp{background:var(--bcorp);color:#fff;}

  /* ── Pagination ── */
  .pager{display:flex;gap:10px;justify-content:center;align-items:center;margin-top:20px;}
  .pager button{background:var(--panel);color:var(--text);border:1px solid var(--border);
    border-radius:8px;padding:7px 16px;cursor:pointer;font-size:14px;}
  .pager button:hover:not(:disabled){border-color:var(--accent);}
  .pager button:disabled{opacity:.4;cursor:not-allowed;}

  .loading{text-align:center;color:var(--muted);padding:60px 0;font-size:15px;}
  footer{text-align:center;color:var(--muted);font-size:12px;padding:20px;}
</style>
</head>
<body>
<header>
  <h1>Techstars Portfolio Explorer</h1>
  <p class="sub">
    Every Techstars portfolio company, searchable and filterable.
    Data via the open <a href="https://github.com/yigitmeteozcan/techstars">Techstars Portfolio API</a>.
  </p>
  <div class="stats" id="stats"></div>
  <div class="controls">
    <input type="search" id="q" placeholder="Search name or description…" autocomplete="off" />
    <select id="region"><option value="">All regions</option></select>
    <select id="year"><option value="">All years</option></select>
    <select id="industry"><option value="">All industries</option></select>
  </div>
  <div class="toggles">
    <span class="toggle" data-flag="isUnicorn">🦄 Unicorns</span>
    <span class="toggle" data-flag="isExit">💰 Exits</span>
    <span class="toggle" data-flag="isBCorp">🌱 B Corps</span>
  </div>
</header>

<main>
  <!-- Toolbar -->
  <div class="toolbar">
    <div class="toolbar-left">
      <input type="checkbox" class="cb-all" id="cb-all" title="Select / deselect all on this page" />
      <span class="sel-label" id="sel-label">Select all on page</span>
    </div>
    <span class="count-badge" id="count-badge"></span>
    <button class="btn btn-csv" id="btn-csv" disabled>⬇ Export CSV</button>
    <button class="btn btn-xl"  id="btn-xl"  disabled>⬇ Export Excel</button>
    <button class="btn" id="btn-clear" disabled>✕ Clear selection</button>
  </div>

  <div class="list" id="list"><div class="loading">Loading 5,000+ companies…</div></div>
  <div class="pager" id="pager"></div>
</main>

<footer>
  Data: <a href="https://cdn.jsdelivr.net/gh/yigitmeteozcan/techstars@main/data/all.json">all.json</a> ·
  Source: <a href="https://www.techstars.com/portfolio">Techstars portfolio</a> ·
  Not affiliated with Techstars.
</footer>

<script>
const CDN = "https://cdn.jsdelivr.net/gh/yigitmeteozcan/techstars@main/data";
const PER_PAGE = 30;

let companies = [], filtered = [], page = 0;
let selected = new Set(); // stores company names as unique keys
const flags = { isUnicorn: false, isExit: false, isBCorp: false };

const $ = id => document.getElementById(id);
const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const uid = c => c.name + "||" + (c.website || "");

// ── Load ────────────────────────────────────────────────────────────────────
async function load() {
  const [all, stats] = await Promise.all([
    fetch(`${CDN}/all.json`).then(r => r.json()),
    fetch(`${CDN}/stats.json`).then(r => r.json()).catch(() => null),
  ]);
  companies = all;
  renderStats(stats);
  buildFilters();
  apply();
}

function renderStats(s) {
  const n = x => Number(x ?? 0).toLocaleString();
  const stat = (val, label) => `<div class="stat"><b>${n(val)}</b><span>${label}</span></div>`;
  $("stats").innerHTML =
    stat(s?.total ?? companies.length, "companies") +
    stat(s?.unicorns ?? companies.filter(c=>c.isUnicorn).length, "🦄 unicorns") +
    stat(s?.exits ?? companies.filter(c=>c.isExit).length, "💰 exits") +
    stat(s?.bCorps ?? companies.filter(c=>c.isBCorp).length, "🌱 B corps");
}

// ── Filters ──────────────────────────────────────────────────────────────────
function uniq(fn, numeric) {
  const s = new Set();
  for (const c of companies) for (const v of [].concat(fn(c)).filter(Boolean)) s.add(v);
  const a = [...s];
  return a.sort(numeric ? (a,b) => b-a : (a,b) => String(a).localeCompare(String(b)));
}

function buildFilters() {
  for (const r of uniq(c => c.region)) $("region").insertAdjacentHTML("beforeend",`<option>${esc(r)}</option>`);
  for (const y of uniq(c => c.year, true)) $("year").insertAdjacentHTML("beforeend",`<option>${esc(y)}</option>`);
  for (const t of uniq(c => c.tags)) $("industry").insertAdjacentHTML("beforeend",`<option>${esc(t)}</option>`);
}

function apply() {
  const q = $("q").value.trim().toLowerCase();
  const region = $("region").value, year = $("year").value, industry = $("industry").value;
  filtered = companies.filter(c => {
    if (q && !(`${c.name} ${c.description}`.toLowerCase().includes(q))) return false;
    if (region && c.region !== region) return false;
    if (year && String(c.year) !== year) return false;
    if (industry && !(c.tags||[]).includes(industry)) return false;
    for (const f in flags) if (flags[f] && !c[f]) return false;
    return true;
  });
  page = 0;
  render();
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const start = page * PER_PAGE;
  const slice = filtered.slice(start, start + PER_PAGE);

  $("list").innerHTML = slice.length
    ? slice.map(card).join("")
    : `<div class="loading">No matches.</div>`;

  // bind card checkboxes
  for (const cb of document.querySelectorAll(".card-cb")) {
    cb.addEventListener("change", e => {
      const key = e.target.dataset.key;
      if (e.target.checked) selected.add(key); else selected.delete(key);
      updateCard(key, e.target.checked);
      syncPageCheckbox(slice);
      updateToolbar();
    });
    // set initial state
    const card = cb.closest(".card");
    if (selected.has(cb.dataset.key)) { cb.checked = true; card.classList.add("selected"); }
  }

  renderPager();
  syncPageCheckbox(slice);
  updateToolbar();
  window.scrollTo({ top: 0 });
}

function card(c) {
  const key = esc(uid(c));
  const init = esc((c.name||"?").slice(0,2).toUpperCase());
  const logo = c.logo
    ? `<img class="logo" src="${esc(c.logo)}" alt="" loading="lazy" onerror="this.outerHTML='<div class=&quot;logo ph&quot;>${init}</div>'" />`
    : `<div class="logo ph">${init}</div>`;
  const badges = [
    c.isUnicorn ? `<span class="badge b-uni">🦄 Unicorn</span>` : "",
    c.isExit    ? `<span class="badge b-exit">💰 Exit</span>`    : "",
    c.isBCorp   ? `<span class="badge b-bcorp">🌱 B Corp</span>` : "",
  ].join("");
  const tags = (c.tags||[]).slice(0,3).map(t=>`<span class="chip">${esc(t)}</span>`).join("");
  const soc = c.social||{};
  const lnk = (url,label) => url ? `<a href="${esc(url)}" target="_blank" rel="noopener">${label}</a>` : "";
  const social = [lnk(soc.linkedin,"in"), lnk(soc.twitter,"𝕏"), lnk(soc.crunchbase,"cb")].filter(Boolean).join(" · ");
  const title = c.website ? `<a href="${esc(c.website)}" target="_blank" rel="noopener">${esc(c.name)}</a>` : esc(c.name);
  return `<div class="card" data-key="${key}">
    <input type="checkbox" class="card-cb" data-key="${key}" />
    ${logo}
    <div class="body">
      <div class="name">${title} ${badges}</div>
      <div class="desc">${esc(c.description)}</div>
      <div class="meta">
        ${c.location ? `<span>📍 ${esc(c.location)}</span>` : ""}
        ${c.year ? `<span class="chip">${esc(c.year)}</span>` : ""}
        ${c.program ? `<span class="chip">${esc(c.program)}</span>` : ""}
        ${tags}
        ${social ? `<span style="margin-left:4px">${social}</span>` : ""}
      </div>
    </div>
  </div>`;
}

function updateCard(key, sel) {
  const card = document.querySelector(`.card[data-key="${CSS.escape(key)}"]`);
  if (card) card.classList.toggle("selected", sel);
}

// ── Select all (page) checkbox ─────────────────────────────────────────────
function syncPageCheckbox(slice) {
  const all = slice.every(c => selected.has(uid(c)));
  const some = slice.some(c => selected.has(uid(c)));
  const cb = $("cb-all");
  cb.checked = all && slice.length > 0;
  cb.indeterminate = some && !all;
}

$("cb-all").addEventListener("change", e => {
  const start = page * PER_PAGE;
  const slice = filtered.slice(start, start + PER_PAGE);
  for (const c of slice) {
    if (e.target.checked) selected.add(uid(c)); else selected.delete(uid(c));
  }
  render();
});

// ── Toolbar ───────────────────────────────────────────────────────────────────
function updateToolbar() {
  const n = selected.size;
  const src = n > 0 ? n + " selected" : "all filtered (" + filtered.length.toLocaleString() + ")";
  $("sel-label").innerHTML = n > 0
    ? `<b>${n}</b> compan${n===1?"y":"ies"} selected`
    : `Select all on page`;
  $("count-badge").textContent = filtered.length.toLocaleString() + " companies shown";
  const hasData = n > 0 || filtered.length > 0;
  $("btn-csv").disabled = !hasData;
  $("btn-xl").disabled  = !hasData;
  $("btn-clear").disabled = n === 0;
}

$("btn-clear").addEventListener("click", () => { selected.clear(); render(); });

// ── Export helpers ────────────────────────────────────────────────────────────
function exportData() {
  // If any are selected, export those; otherwise export all filtered.
  if (selected.size > 0) {
    const keys = selected;
    return companies.filter(c => keys.has(uid(c)));
  }
  return filtered;
}

function toRows(data) {
  return data.map(c => ({
    Name: c.name || "",
    Description: c.description || "",
    Website: c.website || "",
    Location: c.location || "",
    Region: c.region || "",
    Subregion: c.subregion || "",
    Industries: (c.tags||[]).join("; "),
    Year: c.year || "",
    Program: c.program || "",
    IsExit: c.isExit ? "Yes" : "No",
    IsUnicorn: c.isUnicorn ? "Yes" : "No",
    IsBCorp: c.isBCorp ? "Yes" : "No",
    IsCurrentSession: c.isCurrentSession ? "Yes" : "No",
    LinkedIn: (c.social||{}).linkedin || "",
    Twitter: (c.social||{}).twitter || "",
    Facebook: (c.social||{}).facebook || "",
    Crunchbase: (c.social||{}).crunchbase || "",
    Logo: c.logo || "",
  }));
}

// CSV export (no dependencies)
$("btn-csv").addEventListener("click", () => {
  const rows = toRows(exportData());
  if (!rows.length) return;
  const cols = Object.keys(rows[0]);
  const esc = v => { const s = v == null ? "" : String(v); return /[",\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s; };
  const csv = [cols.join(","), ...rows.map(r => cols.map(c => esc(r[c])).join(","))].join("\n");
  download(new Blob([csv], { type: "text/csv" }), `techstars-${label()}.csv`);
});

// Excel export (SheetJS)
$("btn-xl").addEventListener("click", () => {
  const rows = toRows(exportData());
  if (!rows.length) return;
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.json_to_sheet(rows);
  // freeze header row, set column widths
  ws["!freeze"] = { xSplit: 0, ySplit: 1 };
  ws["!cols"] = [30,60,30,30,15,18,40,8,50,8,10,8,15,35,35,35,35,35].map(w => ({ wch: w }));
  XLSX.utils.book_append_sheet(wb, ws, "Techstars");
  XLSX.writeFile(wb, `techstars-${label()}.xlsx`);
});

function label() {
  const q = $("q").value.trim();
  const r = $("region").value, y = $("year").value, i = $("industry").value;
  const parts = [q,r,y,i].filter(Boolean);
  return parts.length ? parts.join("-").toLowerCase().replace(/[^a-z0-9-]/g,"-") : "portfolio";
}

function download(blob, name) {
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
  URL.revokeObjectURL(a.href);
}

// ── Pagination ─────────────────────────────────────────────────────────────────
function renderPager() {
  const pages = Math.ceil(filtered.length / PER_PAGE) || 1;
  $("pager").innerHTML = `
    <button id="prev" ${page===0?"disabled":""}>← Prev</button>
    <span style="color:var(--muted);font-size:13px">Page ${page+1} of ${pages}</span>
    <button id="next" ${page>=pages-1?"disabled":""}>Next →</button>`;
  $("prev")?.addEventListener("click", ()=>{ page--; render(); });
  $("next")?.addEventListener("click", ()=>{ page++; render(); });
}

// ── Event wiring ──────────────────────────────────────────────────────────────
let t;
$("q").addEventListener("input", () => { clearTimeout(t); t = setTimeout(apply, 150); });
["region","year","industry"].forEach(id => $(id).addEventListener("change", apply));
document.querySelectorAll(".toggle").forEach(btn => btn.addEventListener("click", () => {
  const f = btn.dataset.flag;
  flags[f] = !flags[f];
  btn.classList.toggle("on", flags[f]);
  apply();
}));

load().catch(err => {
  $("list").innerHTML = `<div class="loading">Failed to load: ${esc(err.message)}</div>`;
});
</script>
</body>
</html>
